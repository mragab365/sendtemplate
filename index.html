<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WhatsApp Template Sender</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ─── Design tokens ─── */
    :root {
      --wa-dark:       #075E54;
      --wa-mid:        #128C7E;
      --wa-light:      #25D366;
      --wa-pale:       #DCF8C6;
      --wa-teal-faint: #E8F5E9;
      --surface:       #FFFFFF;
      --bg:            #F0F2F5;
      --border:        #D1D5DB;
      --text:          #111827;
      --muted:         #6B7280;
      --error:         #DC2626;
      --error-bg:      #FEF2F2;
      --radius:        12px;
      --shadow:        0 4px 24px rgba(7,94,84,.10);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      background: linear-gradient(135deg, #064e45 0%, #0a7566 40%, #0d9e88 70%, #25D366 100%);
      position: relative;
      overflow: hidden;
    }

    /* ─── Radial glow layers ─── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(circle at 15% 20%, rgba(37,211,102,0.18) 0%, transparent 40%),
        radial-gradient(circle at 85% 75%, rgba(7,94,84,0.35) 0%, transparent 40%),
        radial-gradient(circle at 50% 50%, rgba(18,140,126,0.12) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* ─── Floating chat bubbles ─── */
    .bg-bubbles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .bubble {
      position: absolute;
      border-radius: 50% 50% 50% 4px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.10);
      animation: floatUp linear infinite;
    }
    .bubble:nth-child(1)  { width:60px;  height:44px; left:8%;   bottom:-80px;  animation-duration:14s; animation-delay:0s;   border-radius: 50% 50% 4px 50%; }
    .bubble:nth-child(2)  { width:40px;  height:30px; left:20%;  bottom:-60px;  animation-duration:18s; animation-delay:2s;   }
    .bubble:nth-child(3)  { width:80px;  height:58px; left:35%;  bottom:-100px; animation-duration:12s; animation-delay:4s;   border-radius: 50% 50% 4px 50%; }
    .bubble:nth-child(4)  { width:30px;  height:22px; left:55%;  bottom:-50px;  animation-duration:20s; animation-delay:1s;   }
    .bubble:nth-child(5)  { width:55px;  height:40px; left:68%;  bottom:-80px;  animation-duration:16s; animation-delay:3s;   border-radius: 50% 50% 4px 50%; }
    .bubble:nth-child(6)  { width:45px;  height:33px; left:80%;  bottom:-65px;  animation-duration:11s; animation-delay:5s;   }
    .bubble:nth-child(7)  { width:70px;  height:52px; left:90%;  bottom:-90px;  animation-duration:15s; animation-delay:7s;   border-radius: 50% 50% 4px 50%; }
    .bubble:nth-child(8)  { width:35px;  height:26px; left:45%;  bottom:-55px;  animation-duration:22s; animation-delay:6s;   }
    .bubble:nth-child(9)  { width:50px;  height:37px; left:3%;   bottom:-75px;  animation-duration:17s; animation-delay:9s;   border-radius: 50% 50% 4px 50%; }
    .bubble:nth-child(10) { width:25px;  height:19px; left:72%;  bottom:-40px;  animation-duration:13s; animation-delay:11s;  }

    @keyframes floatUp {
      0%   { transform: translateY(0) rotate(0deg) scale(1);     opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 0.6; }
      100% { transform: translateY(-110vh) rotate(20deg) scale(1.1); opacity: 0; }
    }

    /* ─── Subtle dot grid overlay ─── */
    .bg-grid {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background-image:
        radial-gradient(circle, rgba(255,255,255,0.07) 1px, transparent 1px);
      background-size: 32px 32px;
    }

    /* Card sits above bg layers */
    .card { position: relative; z-index: 1; }

    /* ─── Card ─── */
    .card {
      background: var(--surface);
      border-radius: 20px;
      box-shadow: var(--shadow);
      width: 100%;
      max-width: 460px;
      overflow: hidden;
    }

    /* ─── Header ─── */
    .card-header {
      background: linear-gradient(135deg, var(--wa-dark) 0%, var(--wa-mid) 100%);
      padding: 32px 32px 28px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .wa-icon {
      width: 48px;
      height: 48px;
      background: rgba(255,255,255,0.15);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .wa-icon svg { width: 26px; height: 26px; fill: #fff; }
    .card-header-text h1 {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.3px;
    }
    .card-header-text p {
      font-size: 13px;
      color: rgba(255,255,255,0.7);
      margin-top: 2px;
    }

    /* ─── Body ─── */
    .card-body { padding: 32px; }

    /* ─── Form groups ─── */
    .form-group { margin-bottom: 20px; }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
      letter-spacing: 0.1px;
    }
    label .req { color: var(--wa-mid); margin-left: 2px; }

    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }
    .input-icon {
      position: absolute;
      left: 13px;
      color: var(--muted);
      pointer-events: none;
      display: flex;
    }
    .input-icon svg { width: 17px; height: 17px; }

    input[type="text"],
    input[type="tel"] {
      width: 100%;
      padding: 11px 14px 11px 40px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      color: var(--text);
      background: var(--surface);
      transition: border-color .2s, box-shadow .2s;
      outline: none;
    }
    input[type="text"]:focus,
    input[type="tel"]:focus {
      border-color: var(--wa-mid);
      box-shadow: 0 0 0 3px rgba(18,140,126,0.12);
    }
    input.invalid {
      border-color: var(--error);
      box-shadow: 0 0 0 3px rgba(220,38,38,0.08);
    }

    .field-hint {
      font-size: 11.5px;
      color: var(--muted);
      margin-top: 5px;
    }
    .field-error {
      font-size: 11.5px;
      color: var(--error);
      margin-top: 5px;
      display: none;
    }
    .field-error.visible { display: block; }

    /* ─── File upload ─── */
    .file-drop {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 22px 16px;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      position: relative;
    }
    .file-drop:hover, .file-drop.drag-over {
      border-color: var(--wa-mid);
      background: var(--wa-teal-faint);
    }
    .file-drop.invalid { border-color: var(--error); }
    .file-drop input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    .file-drop-icon { color: var(--wa-mid); margin-bottom: 8px; }
    .file-drop-icon svg { width: 32px; height: 32px; }
    .file-drop-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }
    .file-drop-sub {
      font-size: 12px;
      color: var(--muted);
      margin-top: 3px;
    }

    .file-preview {
      display: none;
      margin-top: 12px;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: var(--wa-teal-faint);
      border-radius: 8px;
    }
    .file-preview.visible { display: flex; }
    .file-preview img {
      width: 40px; height: 40px;
      object-fit: cover;
      border-radius: 6px;
      border: 1px solid var(--border);
    }
    .file-preview-name {
      font-size: 12.5px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 220px;
    }
    .file-clear {
      margin-left: auto;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      display: flex;
      padding: 2px;
    }
    .file-clear:hover { color: var(--error); }

    /* ─── Submit button ─── */
    .btn-submit {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, var(--wa-dark) 0%, var(--wa-mid) 100%);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: opacity .2s, transform .1s;
      letter-spacing: 0.2px;
    }
    .btn-submit:hover:not(:disabled) { opacity: 0.93; transform: translateY(-1px); }
    .btn-submit:disabled { opacity: 0.65; cursor: not-allowed; transform: none; }
    .btn-submit svg { width: 18px; height: 18px; fill: currentColor; }

    /* ─── Spinner ─── */
    .spinner {
      width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: none;
    }
    .spinner.active { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Toast ─── */
    #toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: none;
    }
    .toast {
      min-width: 280px;
      max-width: 360px;
      padding: 14px 18px;
      border-radius: 12px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.16);
      animation: slideIn .3s ease;
      pointer-events: all;
      font-size: 14px;
    }
    .toast.success { background: #F0FDF4; border: 1.5px solid #86EFAC; }
    .toast.error   { background: var(--error-bg); border: 1.5px solid #FCA5A5; }
    .toast-icon { flex-shrink: 0; margin-top: 1px; }
    .toast-icon svg { width: 20px; height: 20px; }
    .toast.success .toast-icon svg { color: #16A34A; }
    .toast.error   .toast-icon svg { color: var(--error); }
    .toast-body { flex: 1; }
    .toast-title { font-weight: 700; font-size: 13.5px; }
    .toast.success .toast-title { color: #15803D; }
    .toast.error   .toast-title { color: #991B1B; }
    .toast-msg { font-size: 12.5px; margin-top: 2px; }
    .toast.success .toast-msg { color: #166534; }
    .toast.error   .toast-msg { color: var(--error); }
    .toast-close {
      background: none; border: none; cursor: pointer;
      color: var(--muted); padding: 0; line-height: 1;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(30px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes fadeOut {
      to { opacity: 0; transform: translateX(30px); }
    }

    /* ─── Global overlay loader ─── */
    #overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.25);
      backdrop-filter: blur(2px);
      z-index: 8888;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 14px;
    }
    #overlay.active { display: flex; }
    .overlay-spinner {
      width: 48px; height: 48px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    .overlay-msg {
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.2px;
    }
  </style>
</head>
<body>

<!-- Background layers -->
<div class="bg-grid"></div>
<div class="bg-bubbles">
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
</div>

<!-- Global overlay loader -->
<div id="overlay">
  <div class="overlay-spinner"></div>
  <div class="overlay-msg" id="overlay-msg">Processing… Please wait</div>
</div>

<!-- Toast container -->
<div id="toast-container"></div>

<div class="card">
  <!-- Header -->
  <div class="card-header">
    <div class="wa-icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
      </svg>
    </div>
    <div class="card-header-text">
      <h1>Send Template</h1>
    </div>
  </div>

  <!-- Body -->
  <div class="card-body">

    <!-- Mobile number -->
    <div class="form-group">
      <label for="mobile">Mobile Number <span class="req">*</span></label>
      <div class="input-wrap">
        <span class="input-icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81 19.79 19.79 0 01.12 1.2 2 2 0 012.11 0h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 14.92z"/>
          </svg>
        </span>
        <input type="tel" id="mobile" placeholder="01xxxxxxxxx  or  +201xxxxxxxxx" autocomplete="off" />
      </div>
      <div class="field-hint">Will be formatted as +20xxxxxxxxxx automatically.</div>
      <div class="field-error" id="mobile-err">Please enter a valid Egyptian mobile number.</div>
    </div>

    <!-- Image upload -->
    <div class="form-group">
      <label>Image <span class="req">*</span></label>
      <div class="file-drop" id="file-drop">
        <input type="file" id="file-input" accept=".jpg,.jpeg,.png,image/jpeg,image/png" />
        <div class="file-drop-icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
        </div>
        <div class="file-drop-label">Click to choose an image</div>
        <div class="file-drop-sub">JPG and PNG only — max 10 MB</div>
      </div>
      <div class="field-error" id="file-err">Please select an image to upload.</div>
      <div class="file-preview" id="file-preview">
        <img id="preview-img" src="" alt="preview" />
        <span class="file-preview-name" id="preview-name"></span>
        <button class="file-clear" id="file-clear" title="Remove">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Submit -->
    <button class="btn-submit" id="btn-submit">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
      </svg>
      <span id="btn-label">Send via WhatsApp</span>
      <div class="spinner" id="btn-spinner"></div>
    </button>

  </div>
</div>

<script>
  /* ═══════════════════════════════════════════════
     GLOBAL CONFIG — easy to change later
  ═══════════════════════════════════════════════ */
  const CONFIG = {
    channelId:    19,
    headerType:   1,
    categoryId:   2,
    templateName: "bankcardtemplate",
    languageCode: "en_US",
    showInChat:   true,
  };

  const BASE = "https://dev.qc-community.com/wabp";

  const ENDPOINTS = {
    login:       `${BASE}/identity/api/Authentication/login`,
    upload:      `${BASE}/BackEndApi/api/File/uploadFormFileCloudFlare/fileModuleType/5`,
    sendTemplate:`${BASE}/backendapi/api/WhatsApp/v1/send/template`,
  };

  /* ═══════════════════════════════════════════════
     STATE
  ═══════════════════════════════════════════════ */
  let cachedToken = null;  // persists across submits

  /* ═══════════════════════════════════════════════
     HELPERS
  ═══════════════════════════════════════════════ */

  /** Format mobile → +20xxxxxxxxxx */
  function formatMobile(raw) {
    let n = raw.trim().replace(/\s+/g, "");
    if (n.startsWith("+20"))  return n;
    if (n.startsWith("0020")) return "+" + n.slice(2);
    if (n.startsWith("20"))   return "+" + n;
    if (n.startsWith("0"))    return "+20" + n.slice(1);
    return "+20" + n;
  }

  /** Validate Egyptian mobile: after formatting must be +201XXXXXXXXX (12 digits) */
  function isValidMobile(raw) {
    const formatted = formatMobile(raw);
    return /^\+201[0-9]{9}$/.test(formatted);
  }

  /** Generate a simple unique message ID */
  function genMessageId() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
  }

  /* ═══════════════════════════════════════════════
     TOAST
  ═══════════════════════════════════════════════ */
  function showToast(type, title, msg) {
    const c = document.getElementById("toast-container");
    const t = document.createElement("div");
    t.className = `toast ${type}`;

    const icon = type === "success"
      ? `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>`
      : `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`;

    t.innerHTML = `
      <span class="toast-icon">${icon}</span>
      <div class="toast-body">
        <div class="toast-title">${title}</div>
        ${msg ? `<div class="toast-msg">${msg}</div>` : ""}
      </div>
      <button class="toast-close" onclick="this.closest('.toast').remove()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="14" height="14"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>`;
    c.appendChild(t);
    setTimeout(() => {
      t.style.animation = "fadeOut .3s ease forwards";
      setTimeout(() => t.remove(), 300);
    }, 5000);
  }

  /* ═══════════════════════════════════════════════
     OVERLAY / LOADING
  ═══════════════════════════════════════════════ */
  function setLoading(active) {
    const overlay = document.getElementById("overlay");
    const btn     = document.getElementById("btn-submit");
    const spinner = document.getElementById("btn-spinner");
    const label   = document.getElementById("btn-label");

    if (active) {
      overlay.classList.add("active");
      document.getElementById("overlay-msg").textContent = "Processing… Please wait";
      btn.disabled = true;
      spinner.classList.add("active");
      label.textContent = "Processing…";
    } else {
      overlay.classList.remove("active");
      btn.disabled = false;
      spinner.classList.remove("active");
      label.textContent = "Send via WhatsApp";
    }
  }

  /* ═══════════════════════════════════════════════
     API CALLS
  ═══════════════════════════════════════════════ */

  /** Get token — only called when no token cached or after 401 */
  async function fetchToken() {
    const res = await fetch(ENDPOINTS.login, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ clientId: "api", clientSecret: "api", grantType: "client_credentials" }),
    });
    if (!res.ok) throw new Error(`Auth failed (HTTP ${res.status})`);
    const json = await res.json();
    if (!json?.data?.accessToken) throw new Error("Auth failed: no access token returned.");
    cachedToken = json.data.accessToken;
    return cachedToken;
  }

  /** Returns cached token or fetches a fresh one */
  async function getToken() {
    if (!cachedToken) return await fetchToken();
    return cachedToken;
  }

  /** Upload image as multipart/form-data — key matches C# param: IFormFile formFiles */
  async function uploadImage(file, token) {
    const fd = new FormData();
    fd.append("formFiles", file, file.name);  // must match C# parameter name exactly

    const res = await fetch(ENDPOINTS.upload, {
      method: "POST",
      // Do NOT set Content-Type — browser sets multipart/form-data + boundary automatically
      headers: { Authorization: `Bearer ${token}` },
      body: fd,
    });

    if (res.status === 401) return null;
    if (!res.ok) throw new Error(`Upload failed (HTTP ${res.status})`);

    const json = await res.json();
    if (json.code !== 0 || !json?.data?.fileSecretName)
      throw new Error(json.message || "Upload failed: server returned an error.");

    return json.data.fileSecretName;
  }

  /** Send template */
  async function sendTemplate(mobile, fileSecretName, token) {
    const body = {
      channelId:    CONFIG.channelId,
      headerType:   CONFIG.headerType,
      categoryId:   CONFIG.categoryId,
      messageId:    genMessageId(),
      mobileNumber: mobile,
      templateName: CONFIG.templateName,
      languageCode: CONFIG.languageCode,
      showInChat:   CONFIG.showInChat,
      buttons: [{ index: 0, value: fileSecretName, typeId: 1 }],
    };
    const res = await fetch(ENDPOINTS.sendTemplate, {
      method: "POST",
      headers: { "Content-Type": "application/json", Authorization: `Bearer ${token}` },
      body: JSON.stringify(body),
    });
    if (res.status === 401) return null; // signal 401
    if (!res.ok) throw new Error(`Send failed (HTTP ${res.status})`);
    return await res.json();
  }

  /* ═══════════════════════════════════════════════
     MAIN FLOW  (cached token + silent 401 retry)
  ═══════════════════════════════════════════════ */
  async function runFlow(mobileFormatted, file) {
    setLoading(true);
    try {
      // Use cached token or fetch if missing
      let token = await getToken();

      // Upload — on 401 refresh token once and retry
      let fileSecretName = await uploadImage(file, token);
      if (fileSecretName === null) {
        cachedToken = null;
        token = await fetchToken();
        fileSecretName = await uploadImage(file, token);
        if (fileSecretName === null) throw new Error("Upload failed: unauthorized after retry.");
      }

      // Send template — on 401 refresh token once and retry
      let result = await sendTemplate(mobileFormatted, fileSecretName, token);
      if (result === null) {
        cachedToken = null;
        token = await fetchToken();
        result = await sendTemplate(mobileFormatted, fileSecretName, token);
        if (result === null) throw new Error("Send failed: unauthorized after retry.");
      }

      // Result
      if (result.code === 0) {
        showToast("success", "Message sent!", result.message || "Template delivered successfully.");
      } else {
        showToast("error", "Template not sent", result.message || "Server returned an error.");
      }

    } catch (err) {
      showToast("error", "Error", err.message || "An unexpected error occurred.");
    } finally {
      setLoading(false);
    }
  }

  /* ═══════════════════════════════════════════════
     FILE INPUT
  ═══════════════════════════════════════════════ */
  const fileInput   = document.getElementById("file-input");
  const fileDrop    = document.getElementById("file-drop");
  const filePreview = document.getElementById("file-preview");
  const previewImg  = document.getElementById("preview-img");
  const previewName = document.getElementById("preview-name");
  const fileClear   = document.getElementById("file-clear");

  function showPreview(file) {
    const reader = new FileReader();
    reader.onload = (e) => { previewImg.src = e.target.result; };
    reader.readAsDataURL(file);
    previewName.textContent = file.name;
    filePreview.classList.add("visible");
    fileDrop.style.display = "none";
  }

  function clearFile() {
    fileInput.value = "";
    filePreview.classList.remove("visible");
    fileDrop.style.display = "";
    previewImg.src = "";
  }

  fileInput.addEventListener("change", () => {
    const f = fileInput.files[0];
    if (f) {
      if (f.type !== "image/jpeg" && f.type !== "image/png") {
        showToast("error", "Invalid file type", "Only JPG and PNG images are accepted.");
        fileInput.value = "";
        return;
      }
      showPreview(f);
    }
  });
  fileClear.addEventListener("click", clearFile);

  fileDrop.addEventListener("dragover", e => { e.preventDefault(); fileDrop.classList.add("drag-over"); });
  fileDrop.addEventListener("dragleave", () => fileDrop.classList.remove("drag-over"));
  fileDrop.addEventListener("drop", e => {
    e.preventDefault();
    fileDrop.classList.remove("drag-over");
    const f = e.dataTransfer.files[0];
    if (f && (f.type === "image/jpeg" || f.type === "image/png")) {
      fileInput.files = e.dataTransfer.files;
      showPreview(f);
    }
  });

  /* ═══════════════════════════════════════════════
     VALIDATION + SUBMIT
  ═══════════════════════════════════════════════ */
  const mobileInput = document.getElementById("mobile");
  const mobileErr   = document.getElementById("mobile-err");
  const fileErr     = document.getElementById("file-err");

  function validate() {
    let ok = true;

    // mobile
    const rawMobile = mobileInput.value.trim();
    if (!rawMobile || !isValidMobile(rawMobile)) {
      mobileInput.classList.add("invalid");
      mobileErr.classList.add("visible");
      ok = false;
    } else {
      mobileInput.classList.remove("invalid");
      mobileErr.classList.remove("visible");
    }

    // file
    if (!fileInput.files[0]) {
      fileDrop.classList.add("invalid");
      fileErr.classList.add("visible");
      ok = false;
    } else {
      fileDrop.classList.remove("invalid");
      fileErr.classList.remove("visible");
    }

    return ok;
  }

  mobileInput.addEventListener("input", () => {
    if (mobileInput.classList.contains("invalid") && isValidMobile(mobileInput.value.trim())) {
      mobileInput.classList.remove("invalid");
      mobileErr.classList.remove("visible");
    }
  });

  document.getElementById("btn-submit").addEventListener("click", () => {
    if (!validate()) return;
    const mobileFormatted = formatMobile(mobileInput.value.trim());
    const file = fileInput.files[0];
    runFlow(mobileFormatted, file);
  });
</script>
</body>
